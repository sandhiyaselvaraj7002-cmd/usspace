<!DOCTYPE html>
<html>
<head>
    <title>UsSpace Login 💜</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right,#ff9a9e,#fad0c4);

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: #f2f2f2;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔒 UsSpace</h2>
    <p>Enter PIN</p>

    <input type="password" id="pin" placeholder="Enter PIN">

    <button onclick="login()">Unlock</button>
</div>

<script>
let correctPin = "1234";

function login(){
    let pin = document.getElementById("pin").value;

    if(pin === correctPin){
        window.location.href = "home.html";
    } else {
        alert("Wrong PIN ❌");
    }
}
</script>

</body>
</html>
